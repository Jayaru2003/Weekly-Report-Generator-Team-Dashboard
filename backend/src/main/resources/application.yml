spring:
  datasource:
    # Supabase PostgreSQL URL format:
    # jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
    url: jdbc:postgresql://db.bbxkjzgdjwkjxpshipng.supabase.co:5432/postgres?sslmode=require
    username: postgres
    password: "Jayaru#20031105"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    show-sql: false
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

application:
  jwt:
    secret: ${JWT_SECRET}
    # Token expiration in milliseconds — 24 hours by default
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.weeklyreport: DEBUG
